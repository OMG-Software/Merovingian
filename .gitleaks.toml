title = "Merovingian gitleaks allowlist"

[extend]
useDefault = true

[[allowlists]]
description = "Reviewed test fixtures and CI placeholders"
paths = [
  '''(^|/)tests/''',
  '''^\.github/workflows/postgres-integration\.yml$''',
]

[[allowlists]]
description = "Local Matrix v1.18 spec copy — example tokens and keys are spec test vectors, not real credentials"
paths = [
  '''^docs/matrix-v1\.18-spec/''',
]
