# Codecov project configuration for Merovingian
# Docs: https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        # Require at least 60% overall line coverage.
        # Threshold allows a 2% drop before failing the check.
        target: 60%
        threshold: 2%
        informational: false
    patch:
      default:
        # New code contributed in a PR should be at least 50% covered.
        target: 50%
        threshold: 5%
        informational: false

  ignore:
    - "tests/"
    - "subprojects/"
    - "packaging/"
    - "scripts/"
    - "src/homeserver/main.cpp"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
