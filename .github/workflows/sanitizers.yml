name: sanitizers

on:
  push:
  pull_request:

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            clang \
            catch2 \
            flex \
            libssl-dev \
            m4 \
            perl \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Build and test with sanitizers
        run: sh scripts/build-linux.sh --builddir build --buildtype debug --sanitize address,undefined
