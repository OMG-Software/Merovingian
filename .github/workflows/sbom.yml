name: SBOM

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: merovingian.spdx.json
          artifact-name: merovingian-sbom-spdx

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: merovingian.cdx.json
          artifact-name: merovingian-sbom-cyclonedx

      - name: Attach SBOMs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            merovingian.spdx.json \
            merovingian.cdx.json \
            --repo "${{ github.repository }}"
