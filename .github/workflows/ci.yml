name: CI
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'codex/**'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "32 1 * * 1"

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  linux-build-and-test:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            catch2 \
            libsodium-dev \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Configure
        run: meson setup build -Dbuild_tests=true -Dbuild_fuzz=false

      - name: Compile
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

      - name: Stage CI artifacts
        run: |
          mkdir -p artifacts/bin artifacts/config artifacts/docs
          cp build/src/merovingian-server artifacts/bin/
          cp config/merovingian.conf.example artifacts/config/
          cp README.md docs/configuration.md docs/progress.md docs/protocol-coverage.md docs/01-production-readiness.md docs/security-review-checklist.md artifacts/docs/
          tar -C artifacts -czf merovingian-ci-artifacts.tar.gz .

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-linux-${{ github.sha }}
          path: merovingian-ci-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── FreeBSD ────────────────────────────────────────────────────────────────
  freebsd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            pkg install -y meson ninja llvm catch2 pkgconf git libsodium
            meson setup build -Dbuild_tests=true -Dbuild_fuzz=false
            meson compile -C build
            meson test -C build --print-errorlogs
            mkdir -p artifacts/bin artifacts/config artifacts/docs
            cp build/src/merovingian-server artifacts/bin/
            cp config/merovingian.conf.example artifacts/config/
            cp README.md docs/configuration.md docs/progress.md docs/protocol-coverage.md docs/01-production-readiness.md docs/security-review-checklist.md artifacts/docs/
            tar -C artifacts -czf merovingian-freebsd-artifacts.tar.gz .

      - name: Upload FreeBSD CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-freebsd-${{ github.sha }}
          path: merovingian-freebsd-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14