name: CI
on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'codex/**'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "32 1 * * 1"

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────
  ubuntu-build-and-test:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Cache compiler output with ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-linux-ci-${{ github.run_id }}
          restore-keys: ccache-linux-ci-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            ccache \
            clang \
            clang-tidy \
            catch2 \
            flex \
            libcurl4-openssl-dev \
            libpng-dev \
            libpq-dev \
            libsodium-dev \
            libssl-dev \
            libturbojpeg0-dev \
            m4 \
            perl \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Build and test
        run: sh scripts/build-linux.sh --builddir build

      - name: Conformance gate
        run: sh scripts/check-conformance-gate.sh build

      - name: Packaging sanity gate
        run: meson test -C build packages-workflow-tooling --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

      - name: Stage CI artifacts
        run: |
          mkdir -p artifacts/bin artifacts/config artifacts/docs
          cp build/src/merovingian-server artifacts/bin/
          cp config/merovingian.conf.example artifacts/config/
          cp README.md docs/configuration.md docs/security-review-checklist.md artifacts/docs/
          tar -C artifacts -czf merovingian-ci-artifacts.tar.gz .

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-linux-${{ github.sha }}
          path: merovingian-ci-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14

  # -- Fedora / Red Hat family -----------------------------------------------
  fedora-build-and-test:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            bison \
            ccache \
            catch-devel \
            clang \
            clang-tools-extra \
            cppcheck \
            flex \
            gcc-c++ \
            git \
            lld \
            m4 \
            meson \
            ninja-build \
            libcurl-devel \
            libpng-devel \
            libpq-devel \
            libsodium-devel \
            openssl-devel \
            perl \
            turbojpeg-devel \
            pkgconf-pkg-config \
            python3

      - uses: actions/checkout@v4

      - name: Cache compiler output with ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-fedora-ci-${{ github.run_id }}
          restore-keys: ccache-fedora-ci-

      - name: Build and test
        run: sh scripts/build-linux.sh --builddir build-fedora

      - name: Conformance gate
        run: sh scripts/check-conformance-gate.sh build-fedora

      - name: Packaging sanity gate
        run: meson test -C build-fedora packages-workflow-tooling --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build-fedora

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

  # ── Debian (trixie) ────────────────────────────────────────────────────────
  # Minimum Debian version per platform-support.md: Debian 13 (trixie),
  # which provides glibc ≥ 2.39 and a C++26-capable clang 18+ toolchain.
  debian-build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bison \
            ca-certificates \
            ccache \
            clang \
            flex \
            gcc \
            git \
            libcurl4-openssl-dev \
            libpng-dev \
            libpq-dev \
            libsodium-dev \
            libssl-dev \
            libturbojpeg0-dev \
            m4 \
            meson \
            ninja-build \
            perl \
            pkg-config \
            python3

      - uses: actions/checkout@v4

      - name: Cache compiler output with ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-debian-ci-${{ github.run_id }}
          restore-keys: ccache-debian-ci-

      - name: Build and test
        run: sh scripts/build-linux.sh --builddir build-debian

      - name: Conformance gate
        run: sh scripts/check-conformance-gate.sh build-debian

      - name: Packaging sanity gate
        run: meson test -C build-debian packages-workflow-tooling --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build-debian

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

  # ── RHEL-compatible / AlmaLinux 10 ─────────────────────────────────────────
  # Minimum RHEL version per platform-support.md: RHEL 10 (glibc ≥ 2.39,
  # clang 18 in AppStream). AlmaLinux 10 is the community rebuild used in CI;
  # EPEL 10 provides libsodium and turbojpeg.
  rhel-build-and-test:
    runs-on: ubuntu-latest
    container:
      image: almalinux:10
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Install EPEL and build dependencies
        run: |
          dnf install -y epel-release
          dnf install -y \
            bison \
            ccache \
            clang \
            clang-tools-extra \
            flex \
            gcc-c++ \
            git \
            m4 \
            meson \
            ninja-build \
            libcurl-devel \
            libpng-devel \
            libpq-devel \
            libsodium-devel \
            openssl-devel \
            perl \
            turbojpeg-devel \
            pkgconf-pkg-config \
            python3

      - uses: actions/checkout@v4

      - name: Cache compiler output with ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-rhel-ci-${{ github.run_id }}
          restore-keys: ccache-rhel-ci-

      - name: Build and test
        run: sh scripts/build-linux.sh --builddir build-rhel

      - name: Conformance gate
        run: sh scripts/check-conformance-gate.sh build-rhel

      - name: Packaging sanity gate
        run: meson test -C build-rhel packages-workflow-tooling --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build-rhel

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

  # ── OpenSUSE Tumbleweed ─────────────────────────────────────────────────────
  # OpenSUSE Leap 15.x ships glibc 2.31, which predates the C++26 requirement.
  # Tumbleweed (rolling release) carries a current glibc and clang 18+, making
  # it the supported OpenSUSE target per platform-support.md.
  opensuse-build-and-test:
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Install build dependencies
        run: |
          zypper --non-interactive refresh
          zypper --non-interactive install -y \
            bison \
            ccache \
            clang \
            flex \
            gcc-c++ \
            git \
            m4 \
            meson \
            ninja \
            pkg-config \
            libopenssl-devel \
            libsodium-devel \
            postgresql-devel \
            libpng16-devel \
            libjpeg8-devel \
            libcurl-devel \
            sqlite3-devel \
            perl \
            python3

      - uses: actions/checkout@v4

      - name: Cache compiler output with ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-opensuse-ci-${{ github.run_id }}
          restore-keys: ccache-opensuse-ci-

      - name: Build and test
        run: sh scripts/build-linux.sh --builddir build-opensuse

      - name: Conformance gate
        run: sh scripts/check-conformance-gate.sh build-opensuse

      - name: Packaging sanity gate
        run: meson test -C build-opensuse packages-workflow-tooling --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build-opensuse

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh

      - name: Check release readiness metadata
        run: sh scripts/check-release-readiness.sh

  # ── FreeBSD ────────────────────────────────────────────────────────────────
  freebsd-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            pkg install -y meson ninja llvm catch2 pkgconf git perl5 bison flex gmake openssl libsodium postgresql17-client curl png libjpeg-turbo
            sh scripts/build-bsd.sh --builddir build
            mkdir -p artifacts/bin artifacts/config artifacts/docs
            cp build/src/merovingian-server artifacts/bin/
            cp config/merovingian.conf.example artifacts/config/
            cp README.md docs/configuration.md docs/security-review-checklist.md artifacts/docs/
            tar -C artifacts -czf merovingian-freebsd-artifacts.tar.gz .

      - name: Upload FreeBSD CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-freebsd-${{ github.sha }}
          path: merovingian-freebsd-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── OpenBSD ────────────────────────────────────────────────────────────────
  # Tier 1 platform. The build wrapper runs the full meson test suite on the VM,
  # which exercises the platform-specific runtime tests (hardening self-check
  # unit/integration/smoke tests) on OpenBSD itself.
  openbsd-build-and-test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build and test on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add -I meson ninja pkgconf git bison flex gmake openssl libsodium postgresql-client curl png jpeg-turbo
          run: |
            sh scripts/build-bsd.sh --builddir build
            mkdir -p artifacts/bin artifacts/config artifacts/docs
            cp build/src/merovingian-server artifacts/bin/
            cp config/merovingian.conf.example artifacts/config/
            cp README.md docs/configuration.md docs/security-review-checklist.md artifacts/docs/
            tar -C artifacts -czf merovingian-openbsd-artifacts.tar.gz .

      - name: Upload OpenBSD CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-openbsd-${{ github.sha }}
          path: merovingian-openbsd-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ── NetBSD ─────────────────────────────────────────────────────────────────
  # Tier 1 platform. Same full build+test path as the other BSDs.
  netbsd-build-and-test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build and test on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add -U pkgin || true
            pkgin -y install clang meson ninja-build pkgconf git bison flex gmake openssl libsodium postgresql17-client curl png libjpeg-turbo mozilla-rootcerts
            # NetBSD base ships no CA trust store; populate /etc/openssl/certs so
            # the system-CA-trust detection test (and real TLS) has a store.
            /usr/pkg/sbin/mozilla-rootcerts install || true
          run: |
            sh scripts/build-bsd.sh --builddir build
            mkdir -p artifacts/bin artifacts/config artifacts/docs
            cp build/src/merovingian-server artifacts/bin/
            cp config/merovingian.conf.example artifacts/config/
            cp README.md docs/configuration.md docs/security-review-checklist.md artifacts/docs/
            tar -C artifacts -czf merovingian-netbsd-artifacts.tar.gz .

      - name: Upload NetBSD CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-netbsd-${{ github.sha }}
          path: merovingian-netbsd-artifacts.tar.gz
          if-no-files-found: error
          retention-days: 14