name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            catch2 \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Configure
        run: meson setup build -Dbuild_tests=true -Dbuild_fuzz=false

      - name: Compile
        run: meson compile -C build

      - name: Test
        run: meson test -C build --print-errorlogs

      - name: Validate Phase 1 configuration gates
        run: bash scripts/validate-phase1-config.sh build

      - name: Reject unsafe allocation patterns
        run: bash scripts/reject-unsafe.sh
