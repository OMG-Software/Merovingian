name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            catch2 \
            clang \
            flex \
            gcovr \
            libpq-dev \
            libsodium-dev \
            libssl-dev \
            llvm \
            m4 \
            perl \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Build and test with coverage
        run: sh scripts/build-linux.sh --builddir build-coverage --coverage

      - name: Generate coverage reports
        run: |
          mkdir -p coverage
          # gcovr translates clang's gcov-compatible .gcno/.gcda files into
          # Cobertura XML for Codecov.  llvm-cov gcov is required instead of
          # plain gcov because the binaries were compiled with clang.
          #
          # Coverage is accumulated from ALL four C++ test types that run
          # under "meson test":
          #   - unit tests      (merovingian-unit-tests binary)
          #   - conformance tests (merovingian-conformance-tests binary)
          #   - integration tests (merovingian-integration-tests binary)
          #   - smoke tests     (run the instrumented server binary directly,
          #                      exercising startup, config, --dry-run paths)
          #
          # build-coverage as a positional argument pins gcovr's .gcda search
          # to the build directory so it does not traverse the whole repo tree.
          gcovr \
            --root . \
            --gcov-executable "llvm-cov gcov" \
            --filter 'src/' \
            --filter 'include/' \
            --exclude 'src/homeserver/main.cpp' \
            --exclude 'tests/' \
            --xml-pretty \
            --html-details \
            --print-summary \
            --output coverage/coverage.xml \
            --html coverage/index.html \
            build-coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          # CODECOV_TOKEN must be added as a repository secret.
          # Obtain it from https://app.codecov.io/gh/OMG-Software/Merovingian
          # then add it under Settings → Secrets → Actions → New repository secret.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.xml
          # "full-test-suite" reflects that the report covers unit,
          # conformance, integration, and smoke tests — not just unit tests.
          flags: full-test-suite
          # Prevent the action running its own gcov pass — we already produced
          # the Cobertura XML above with the correct llvm-cov gcov executable.
          disable_search: true
          # The Codecov action verifies its CLI binary with a GPG signature.
          # The Ubuntu 24.04 runner cannot import the Codecov keyserver key
          # reliably, causing "Can't check signature: No public key" failures
          # before the upload is even attempted.  skip_validation bypasses
          # that check; the binary is still downloaded over HTTPS from
          # cli.codecov.io which is sufficient integrity for our threat model.
          skip_validation: true
          fail_ci_if_error: true
          verbose: true
