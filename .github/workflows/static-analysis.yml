name: static-analysis

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            clang \
            clang-tidy \
            catch2 \
            pkg-config

      - name: Configure
        run: meson setup build -Dbuild_tests=true -Dbuild_fuzz=false

      - name: Generate compile commands
        run: meson compile -C build

      - name: Run clang-tidy on project sources
        run: |
          find include src tests \
            \( -name '*.hpp' -o -name '*.cpp' \) \
            -not -path './build/*' \
            -not -path './subprojects/*' | \
            xargs clang-tidy -p build

      - name: Run unsafe source gates
        run: bash scripts/reject-unsafe.sh
