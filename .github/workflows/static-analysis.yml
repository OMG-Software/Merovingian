name: static-analysis

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            clang \
            clang-tidy \
            catch2 \
            flex \
            libssl-dev \
            m4 \
            perl \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Generate compile commands
        run: sh scripts/build-linux.sh --builddir build --compile-only

      - name: Run clang-tidy on changed C++ translation units
        run: |
          base_branch="${GITHUB_BASE_REF:-main}"
          git fetch --no-tags --depth=1 origin "${base_branch}"

          changed_sources="${RUNNER_TEMP:-/tmp}/clang-tidy-sources.txt"
          git diff --name-only FETCH_HEAD...HEAD -- src tests | \
            grep -E '\.cpp$' | \
            sort > "${changed_sources}" || true

          if [ ! -s "${changed_sources}" ]; then
            echo "No changed C++ translation units for clang-tidy."
            exit 0
          fi

          tr '\n' '\0' < "${changed_sources}" | \
            xargs -0 -n 1 -P "$(nproc)" sh -c '
              echo "::group::clang-tidy $1"
              timeout 120s clang-tidy -p build "$1"
              echo "::endgroup::"
            ' sh

      - name: Run unsafe source gates
        run: bash scripts/reject-unsafe.sh
