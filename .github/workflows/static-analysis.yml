name: static-analysis

on:
  push:
  pull_request:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy \
            catch2 \
            pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja

      - name: Configure
        run: meson setup build -Dbuild_tests=true -Dbuild_fuzz=false

      - name: Generate compile commands
        run: meson compile -C build

      - name: Run clang-tidy on production sources
        run: |
          find include src \
            \( -name '*.hpp' -o -name '*.cpp' \) \
            -not -path './build/*' \
            -not -path './subprojects/*' | \
            xargs clang-tidy -p build

      - name: Run clang-tidy on tests
        run: |
          find tests \
            \( -name '*.hpp' -o -name '*.cpp' \) \
            -not -path './build/*' \
            -not -path './subprojects/*' | \
            xargs clang-tidy -p build

      - name: Run unsafe source gates
        run: bash scripts/reject-unsafe.sh
